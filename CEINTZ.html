<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEINTZ - Iniciar sesión</title>
    
    <!-- External Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/ldrs/dist/auto/trefoil.js"></script>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="./css/header.css">
    <link rel="icon" href="img/Image.ico" type="image/x-icon">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="./img/Logo.png" alt="Logo Gobierno">
            <h1><b>Centro de Emprendimiento Innovación y Negocios del Instituto Tecnológico Superior de Zacapoaxtla (CEINTZ)</b></h1>
        </div>
    </header>    
    <!-- Loader -->
    <div class="loader" id="loader">
        <l-trefoil
            size="120"
            stroke="4"
            stroke-length="0.15"
            bg-opacity="0.1"
            speed="1.4" 
            color="blue">
        </l-trefoil>
    </div>
    <!-- Contenedor principal -->
    <div class="container" id="container">
        <!-- Texto principal -->
        <div class="text-container">
            <h1>Bienvenido al CEINTZ</h1>
            <p>Por favor, inicia sesión para continuar</p>
            <div class="button-container">
                <button onclick="window.location.href='INICIO.html'" class="btn">Entrar como invitado</button>
                <button onclick="window.location.href='CEINTZ.html'" class="btn">Iniciar sesión</button>
            </div>
        </div>
        <!-- Panel de imagen -->
        <div class="panels-container">
            <div class="panel left-panel">
                <img src="img/LOGO_Ceintz.png" class="image" alt="CEINTZ Logo">
            </div>
        </div>
    </div>
    
    <script>
        // Redirigir después de la animación
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('container').style.display = 'flex';
        }, 2000);
    </script>
</body>
</html>
